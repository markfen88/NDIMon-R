<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head><meta charset="UTF-8"><title>Login — NDI Monitor</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
<style>body{background:#12141a;display:flex;align-items:center;justify-content:center;min-height:100vh}
.card{background:#1a1d23;border:1px solid #2a2d35;width:360px}</style>
</head>
<body>
<div class="card p-4">
  <h4 class="text-center mb-4" style="color:#00b4d8"><i class="bi bi-broadcast-pin me-2"></i>NDI Monitor</h4>
  {% with messages = get_flashed_messages(with_categories=true) %}{% for cat,msg in messages %}
  <div class="alert alert-{{ cat }} py-2">{{ msg }}</div>{% endfor %}{% endwith %}
  <form method="POST">
    <div class="mb-3"><label class="form-label text-secondary">Password</label>
    <input type="password" name="password" class="form-control" autofocus></div>
    <button type="submit" class="btn w-100" style="background:#00b4d8;color:#000;font-weight:600">Login</button>
  </form>
</div>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</body></html>
